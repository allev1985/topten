name: topten-observability

services:
  # ── OpenTelemetry Collector ──────────────────────────────────────────────────
  # Receives OTLP traces + metrics from the Next.js app, routes to backends.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP (used by instrumentation.ts)
      - "8889:8889"   # Prometheus metrics scrape endpoint (collector self-metrics)
    depends_on:
      - tempo
      - prometheus
    restart: unless-stopped

  # ── Grafana Tempo (traces) ────────────────────────────────────────────────────
  tempo:
    image: grafana/tempo:2.5.0
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo query API (used by Grafana datasource)
    restart: unless-stopped

  # ── Prometheus (metrics) ──────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  # ── Grafana Loki (logs) ───────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.1.0
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./observability/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"   # Loki HTTP (push + query)
    restart: unless-stopped

  # ── Grafana (dashboards) ──────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_FEATURE_TOGGLES_ENABLE: "traceqlEditor"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"   # Grafana UI — http://localhost:3001
    depends_on:
      - prometheus
      - tempo
      - loki
    restart: unless-stopped

volumes:
  tempo-data:
  prometheus-data:
  loki-data:
  grafana-data:
