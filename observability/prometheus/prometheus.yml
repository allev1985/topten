global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # OTel Collector self-metrics
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  # Prometheus self-metrics
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Tempo self-metrics
  - job_name: tempo
    static_configs:
      - targets: ["tempo:3200"]
    metrics_path: /metrics
